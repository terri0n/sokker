faq.answer1    = <p><i>Sokker Asistente</i> is an online application that helps you manage your <a target="_blank" href="http://www.sokker.org">Sokker</a> team and even a National Team.</p>
faq.answer10   = <p>The projection helps you calculate how a given player could be in the future if he trains 100% every week.</p>\r\n\r\n<p>To do so, select the age over which you want to project the player's skills and adjust the talent to your liking. Automatically the increases in skills due to the general training that the player accumulates until reaching the selected age will be added, and you will be indicated in the number of individual trainings that you can apply. Now increase skills to your liking and the indicator of remaining trainings will decrease accordingly.</p>
faq.answer11   = <p>The NT coaches of the different countries generally use a website to take control of the players. If you check the corresponding checkbox, <i>Sokker Asistente</i> will automatically send the skills of your players to these websites:</p>
faq.answer13   = <p>Sokker access data is not stored on the server, so it is requested every time you want to update your team. The <i>Sokker Asistente</i> password is kept encrypted so, even if it matches that of Sokker, it could not be used.</p>
faq.answer2    = <p>You can keep track of changes in the skills of your players, but especially you can keep track of training millimetrically. You will know how many training points each player has accumulated in each of his skills, how much he has left to go to the next level, what is his approximate talent...</p>
faq.answer3    = <p>They are the effective training time that a player has accumulated per week. This time does not correspond exactly to the minutes played, since each type of match has a different weight for training, and is limited to 100 points per week. <i>Sokker Asistente</i> also takes into account general training when counting accumulated training points.</p>\r\n\r\n<p>The equivalent in training points of each type of match is as follows:</p>\r\n\r\n\u0009\u0009<div align="center">\r\n\u0009\u0009\u0009<div class="tabla sombra">\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<thead class="borde">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Type of match</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Training points</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</thead>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>Official (league, cup, promotion, Champions Cup)</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>90</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>Friendly</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>75</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>National Team</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>45</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n<p>On the other hand, depending on the type of training, the player's role can decrease the effectiveness of the training as follows:</p>\r\n\r\n\u0009\u0009<div align="center">\r\n\u0009\u0009\u0009<div class="tabla sombra">\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<thead class="borde">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Type of training</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">GK</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">DEF</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">MID</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">ATT</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</thead>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Playmaker and passing</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Technique and defender</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="order not selected"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Striker</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>10</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>10</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>50</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tfoot>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="9" style="text-align: right;">* Unconfirmed values</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</tfoot>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\u0009\u0009<br />
faq.answer4    = <p>For direct training, only the skill you train from the main coach is taken into account. If this is unearthly, the training will be 100% effective, losing 10% for every point missing from the skill. </p>\r\n\r\n<p>For general training, the average of the skill in question of the main coach is taken into account with the sum of levels of the assistants divided by 3. If this resulting level is unearthly, the training will be 100% effective, losing 10% for every point missing it turns out. </p>\r\n\r\n<p><i>Sokker Asistente</i> does not settle for using the visible level of the assistants but rather pretends to be as accurate as possible. For this, in addition to the level, we use the average of his skills as a minimum limit, and these two values \u200B\u200B+ 1 as a maximum limit (assuming that all his sub-levels are at maximum). The intersection of these two limits will form the possible range of the real value of the level, keeping the intermediate value.</p>\r\n\r\n<p>For example:</p>\r\n\r\n\u0009\u0009<div style="text-align: center; margin: auto;">\r\n\u0009\u0009\u0009<div class="sombra" style="display: inline-block; text-align: left; background-color: white; opacity: 0.8; padding: 5px;">\r\n\u0009\u0009\u0009\u0009<b>Nae Varia&#x15F;</b>, age: <b>67</b><br/>\r\n\u0009\u0009\u0009\u0009wage: <b>45 175 &euro;</b><br/>\r\n\u0009\u0009\u0009\u0009club: <b>FormulaManager</b>, country: <b>Rom&#xE2;nia</b>,<br/>\r\n\u0009\u0009\u0009\u0009<b>m\u00E1gical</b> coach<br/>\r\n\u0009\u0009\u0009\u0009<br/>\r\n\u0009\u0009\u0009\u0009Training effectiveness as head coach:<br/>\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>unearthly</b> of stamina</td><td><b>incredible</b> of keeper</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>unearthly</b> of pace</td><td><b>unearthly</b> of defender</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>magical</b> of technique</td><td><b>unearthly</b> of playmaker</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>unearthly</b> of passing</td><td><b>unearthly</b> of striker</td></tr>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009\u0009<br/>\r\n\u0009\u0009\u0009\u0009Limits by coach level: <b>[15, 16[</b><br/>\r\n\u0009\u0009\u0009\u0009Average skill level limits: <b>[15.5, 16.5[</b><br/>\r\n\u0009\u0009\u0009\u0009Intersection: <b>[15.5, 16[</b><br/>\r\n\u0009\u0009\u0009\u0009Finally we stay with the average: <b>15.75</b><br/>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n\u0009\u0009<p>With this way of calculating it, the maximum level value of an assistant will be <b>16.5</b></p>\r\n
faq.answer5    = <p>General training is one that the player receives simply by playing a game, except for the stamina skill, which is always received.</p>\r\n\r\n<p><i>Sokker Asistente</i> shows the general training relative to direct training, that is, you will know the approximate equivalence of your general trainings in direct trainings. The exact formula is as follows: </p>\r\n\r\n\u0009\u0009<div style="text-align: center; margin: auto;">\r\n\u0009\u0009\u0009<div class="sombra" style="display: inline-block; text-align: left; background-color: white; opacity: 0.8; padding: 5px;">\r\n\u0009\u0009\u0009\u0009general_training = training_points * coaches_ effectiveness / 9\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n<p>For example: a player who plays 100 minutes, with an unearthly coach (16.5) and 3 brilliant assistants (14.5) would obtain a general training equivalent to 100% * 90% / 9 = 10% of a direct training.</p>\r\n
faq.answer6    = <p>It works differently from other training types, since it is independent of the minutes played by each player. </p>\r\n\r\n<p>Every week, all players receive a fixed amount of stamina training which, as I said before, is about 10% of direct training. But, at the same time, each player can randomly lose a quantity of stamina each week. When lost, this amount is greater than the 10% received, so there are times when players lose a level of stamina the week after it has raised. Over a season, the amount lost is approximately 50% of what is trained.</p>\r\n\r\n<p>As it would be almost impossible to know what actual amount of stamina is trained each week, <i>Sokker Asistente</i> makes an approximation, counting each general stamina training as 5% of the direct training. You can get an idea of \u200B\u200Bhow much you have left to raise each player knowing that 100% is equivalent to a complete training, and that a player can go up a full level with approximately 80% trained. Therefore, when you train stamina, there may be players who raise 2 hit levels and, in general, each player raises a full level of stamina per season (with good coach and assistants). But, at best, if you are lucky enough to never lose training, you could go up a full level in 8 weeks.</p>\r\n
faq.answer7    = <p>Talent is the number of weeks a player needs to go up a full level in youth school with a good youth coach. This number is not accurate, in part because there is an important randomness, but the more weeks the calculation is made, the smaller the margin of error we make.</p>\r\n\r\n<p>On the other hand, the talent of the school corresponds roughly to the double of weeks that a 17-year-old player would need to pop in pace or striker to weak, or defending, technique, playmaker or passing to adequate, provided you have good coaches and assistants. Each level of more supposes approximately 9.4% of increase with respect to the previous level, and each year of more also, with which, once we know how many trainings we need to raise a certain level, we can calculate all the others.</p>\r\n\r\n<p>Although there is no randomness here, there is a margin of error because we can only see the integer value of each skill. Again, the more data we have, the better talent can be limited.</p>\r\n
faq.answer8    = <p>This graph shows the value of the player processed with the intention of eliminating the effect of changes in form on the value. This way you can analyze if a player has been training or not.</p>\r\n\r\n<p>For this we find the value proportionally, given the fact that a player with a tragic form will have 55% of the value he would have with a superdivine form.</p>\r\n
faq.answer9    = <p><i>Sokker Asistente</i> applies a <a href="https://en.wikipedia.org/wiki/Linear_regression" target="_blank">linear regression</a> on the different levels assigned to your juniors throughout his life to estimate the slope of the line that would determine his talent.\r\n
