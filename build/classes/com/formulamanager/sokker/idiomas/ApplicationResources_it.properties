faq.answer1    = <p><i>Sokker Asistente</i> \u00E8 un tool online che ti aiuta a gestire la tua squadra di <a target="_blank" href="http://www.sokker.org">Sokker</a> ed eventualmente la tua nazionale.</p>
faq.answer10   = <p>Il tool di proiezione ti aiuta a calcolare come sar\u00E0 un giocatore se verr\u00E0 allenato al 100% ogni settimana.</p>\r\n\r\n<p>Per farlo, imposta l'et\u00E0 del giocatore per la quale tu vuoi prevedere lo sviluppo delle skill e regola il talento a seconda di come preferisci. Automaticamente gli verr\u00E0 aggiunta la quantit\u00E0 di allenamento generale che gli rimane fino a che non raggiunger\u00E0 l'et\u00E0 settata, quindi verr\u00E0 mostrato il numero di allenamenti diretti che gli servono per raggiungere il livello impostato. Infine, se provi ad incrementare le skill a tuo piacimento, l'indicatore di allenamenti rimasti, diminuir\u00E0.</p>
faq.answer11   = <p>I commissari tecnici delle nazionali, generalmente, usano un database online per gestire i giocatori. Se selezioni la casellina corrispondente, <i>Sokker Asistente</i> invier\u00E0 automaticamente le skill dei tuoi giocatori ai database delle rispettive nazionali:</p>
faq.answer13   = <p>Le credenziali di accesso su Sokker non vengono salvate sul server, quindi vengono richieste ogni volta che vuoi aggiornare la tua squadra. La password di <i>Sokker Asistente</i> \u00E8 salvata criptata. Anche se coincide con quella di sokker, non pu\u00F2 essere utilizzata.</p>
faq.answer2    = <p>Puoi tenere traccia delle variazioni delle skill dei tuoi giocatori e puoi farlo con una precisione al decimale! Conoscerai quanti punti allenamento ha accumulato ogni giocatore in ogni skill, quanto gli rimane per raggiungere il livello superiore, qual \u00E8 approssimativamente il suo talento...</p>
faq.answer3    = <p>Sono i punti relativi ai minuti effettivi di allenamento che ogni giocatore ha accumulato a settimana. Questo minutaggio non corrisponde esattamente ai minuti giocati, in quanto ogni tipo di partita ha un peso differente sull'efficacia dell'allenamento, ed \u00E8 limitato a 100 punti per settimana. <i>Sokker Asistente</i> terr\u00E0 conto dell'allenamento generale quando calcoler\u00E0 i punti di allenamento accumulati.</p>\r\n\r\n<p>L'equivalente di punti allenamento di ogni tipo di partita \u00E8 il seguente:</p>\r\n\r\n\u0009\u0009<div align="center">\r\n\u0009\u0009\u0009<div class="tabla sombra">\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<thead class="borde">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Tipo di partita</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Punti allenamento</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</thead>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>Ufficiale (campionato, coppa, playoff/playout, Champions Cup)</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>90</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>Amichevole</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>75</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td>Squadra nazionale</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td align="center"><b>45</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n<p>D'altro canto, a seconda dell'allenamento, il ruolo del giocatore pu\u00F2 diminuire l'efficacia dell'allenamento secondo i valori seguenti:</p>\r\n\r\n\u0009\u0009<div align="center">\r\n\u0009\u0009\u0009<div class="tabla sombra">\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<thead class="borde">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th>Tipo di allenamento</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">GK</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">DEF</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">MID</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="2">ATT</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</thead>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Regia e passaggi</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="selected order"><b>50</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Tecnica e difesa</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine selezionato"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td title="ordine non selezionato"><b>10</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="text-align: center">\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td style="text-align: left;">Attacco</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>10</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>10</b>*</td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>50</b></td>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<td colspan="2"><b>100</b></td>\r\n\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009<tfoot>\r\n\u0009\u0009\u0009\u0009\u0009\u0009<tr>\r\n\u0009\u0009\u0009\u0009\u0009\u0009\u0009<th colspan="9" style="text-align: right;">* Valore non confermato</th>\r\n\u0009\u0009\u0009\u0009\u0009\u0009</tr>\r\n\u0009\u0009\u0009\u0009\u0009</tfoot>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\u0009\u0009<br />
faq.answer4    = <p>Per l'allenamento diretto, verr\u00E0 considerato solamente il livello di skill del tuo allenatore principale corrispondente alla skill che alleni. Ad esempio, se fosse di livello sovrumano, l'allenamento sar\u00E0 effettivo al 100% e perder\u00E0 il 10% di efficacia per ogni livello di differenza. </p>\r\n\r\n<p> Per l'allenamento generale, verr\u00E0 considerato il livello generale del tuo allenatore principale assieme alla somma dei livelli generali degli altri assistenti divisa per 3. Se il livello risultante sar\u00E0 "sovrumano", allora l'allenamento sar\u00E0 effettivo al 100%, mentre perder\u00E0 di efficacia del 10% per ogni livello inferiore al sovrumano. </p>\r\n\r\n<p><i>Sokker Asistente</i> non guarda semplicemente al livello generale indicato ma vuole essere il pi\u00F9 preciso possibile. Per questo, oltre al livello, usa la media dei valori delle singole skills come limite minimo e quest'ultimo aumentato di \u200B\u200B+ 1 come limite massimo (assumento che i suoi decimali siano al massimo). L'intersezione di questi due intervalli di valori indicher\u00E0 l'intervallo possibile dove sta il vero valore del livello, si prender\u00E0 quindi il valore medio.</p>\r\n\r\n<p>Per esempio:</p>\r\n\r\n\u0009\u0009<div style="text-align: center; margin: auto;">\r\n\u0009\u0009\u0009<div class="sombra" style="display: inline-block; text-align: left; background-color: white; opacity: 0.8; padding: 5px;">\r\n\u0009\u0009\u0009\u0009<b>Nae Varia&#x15F;</b>, et\u00E0: <b>67</b><br/>\r\n\u0009\u0009\u0009\u0009wage: <b>45 175 &euro;</b><br/>\r\n\u0009\u0009\u0009\u0009club: <b>FormulaManager</b>, Nazione: <b>Rom&#xE2;nia</b>,<br/>\r\n\u0009\u0009\u0009\u0009<b>m\u00E1gical</b> allenatore<br/>\r\n\u0009\u0009\u0009\u0009<br/>\r\n\u0009\u0009\u0009\u0009 skill allenatore principale:<br/>\r\n\u0009\u0009\u0009\u0009<table>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>sovrumano</b> di resistenza</td><td><b>incredibile</b> di parate</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>sovrumano</b> di velocit\u00E0</td><td><b>sovrumano</b> di difesa</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>magico</b> di tecnica</td><td><b>sovrumano</b> di regi</td></tr>\r\n\u0009\u0009\u0009\u0009\u0009<tr style="background-color: transparent;"><td><b>sovrumano</b> di passaggi</td><td><b>sovrumano</b> di attacco</td></tr>\r\n\u0009\u0009\u0009\u0009</table>\r\n\u0009\u0009\u0009\u0009<br/>\r\n\u0009\u0009\u0009\u0009 Intervallo dato dal valore generale dell'allenatore: <b>[15, 16]</b><br/>\r\n\u0009\u0009\u0009\u0009Intervallo dato dalla media delle skill: <b>[15.5, 16.5]</b><br/>\r\n\u0009\u0009\u0009\u0009Intersezione: <b>[15.5, 16[</b><br/>\r\n\u0009\u0009\u0009\u0009Valore medio ottenuto: <b>15.75</b><br/>\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n\u0009\u0009<p>Con questo metodo di calcolo, il livello massimo del valore di un assistente sar\u00E0 di <b>16.5</b></p>\r\n
faq.answer5    = <p>L'allenamento generale \u00E8 quello che un giocatore riceve dalla semplice partecipazione ad una partita, ad eccezione della resistenza, in quanto \u00E8 sempre ricevuta.</p>\r\n\r\n<p><i>Sokker Asistente</i> mostra l'allenamento generale in rapporto all'allenamento diretto, quindi otterrai il valore di allenamento generale come frazione dell'allenamento diretto. La formula esatta \u00E8 la seguente: </p>\r\n\r\n\u0009\u0009<div style="text-align: center; margin: auto;">\r\n\u0009\u0009\u0009<div class="sombra" style="display: inline-block; text-align: left; background-color: white; opacity: 0.8; padding: 5px;">\r\n\u0009\u0009\u0009\u0009allenamento_generale = punti_allenamento * efficacia_allenatore / 9\r\n\u0009\u0009\u0009</div>\r\n\u0009\u0009</div>\r\n\r\n<p>Per esempio: un giocatore che gioca 100 minuti, con un allenatore sovrumano (16.5) e tre assistenti splendidi (14.5) dovrebbe ottenere un allenamento generale equivalente a 100% * 90% / 9 = 10% di un allenamento diretto.</p>\r\n
faq.answer6    = <p>Funziona differentemente dagli altri tipi di allenamento, dal momento che \u00E8 indipendente dai minuti giocati da ogni giocatore. </p>\r\n\r\n<p>Ogni settimana, tutti i giocatori ricevono un ammontare fisso di allenamento di resistenza, il quale, come detto precedentemente, \u00E8 circa il 10% dell'allenamento diretto ma, allo stesso tempo, ogni giocatore pu\u00F2 perdere una quantit\u00E0 casuale in resistenza ogni settimana. Quando succede, questo ammontare \u00E8 maggiore del 10% ricevuto, quindi ci sono delle volte che un giocatore perde un livello di resistenza subito dopo averne guadagnato uno. Lungo la durata di una stagione, l'ammontare ricevuto \u00E8 circa il 50% di quanto allenato.</p>\r\n\r\n<p>Dato che \u00E8 quasi impossibile conoscere qual \u00E8 l'ammontare attuale di resistenza ogni settimana, <i>Sokker Asistente</i> fa un'approssimazione, contando ogni allenamento generale di resistenza come il 5% dell'allenamento diretto. Puoi avere un'idea di \u200B\u200Bquanto rimane per scattare ad ogni giocatore sapendo che il 100% \u00E8 equivalente all'allenamento completo e che un giocatore pu\u00F2 scattare con l'80% di allenamento circa. Quindi, quando alleni resistenza, ci possono essere giocatori che scattano di due livelli e, in generale, ogni giocatore scatta di un livello a stagione (con un buon coach e buoni assistenti). Nella migliore delle ipotesi, se sei fortunato abbastanza di non perdere mai nessun allenamento, potresti scattare in 8 settimane.</p>\r\n
faq.answer7    = <p>Il talento \u00E8 il numero di settimane che necessitano ad un giocatore per scattare nella squadra giovanile con un buon allenatore delle giovanili. Questo numero non \u00E8 accurato in quanto c'\u00E8 una parte importante di aleatoriet\u00E0 ma, pi\u00F9 sono le settimane per la quale si esegue il calcolo, pi\u00F9 \u00E8 piccolo il margine di errore che si ottiene.</p>\r\n\r\n<p>D'altro canto, il talento delle giovanili corrisponde grezzamente al doppio delle settimane che un giocatore 17enne necessiterebbe per scattare in velocit\u00E0 o attacco a debole, oppure difesa, tecnica, regia o passaggi in accettabile, in caso tu abbia dei buoni allenatori e assistenti. Ogni livello superiore richiede approssimativamente il 9.4% di allenamento in pi\u00F9 per scattare rispetto al livello precedente, questo succede anche con un anno in pi\u00F9. Con ci\u00F2, una volta che conosciamo quanti allenamenti ci servono per scattare ad un certo livello, possiamo calcolare tutti gli altri.</p>\r\n\r\n<p>Nonostante qui non ci sia nessuna variabile aleatoria, rimane comunque un piccolo margine di errore in quanto possiamo vedere solo il valore intero di ogni skill. Anche qui, pi\u00F9 dati si hanno, pi\u00F9 il calcolo \u00E8 preciso. </p>\r\n
faq.answer8    = <p>Questo grafico mostra il valore di un giocatore processato con lo scopo di eliminare l'effetto di cambiamento del valore per via della forma. In questo modo puoi analizzare se un giocatore \u00E8 stato allenato o meno.</p>\r\n\r\n<p>Quindi troviamo il valore in modo proporzionale, partendo dal fatto che un giocatore con forma tragica avr\u00E0 il 55% del valore che avrebbe con forma superdivina.</p>\r\n
faq.answer9    = <p><i>Sokker Asistente</i> applica la  <a href="https://it.wikipedia.org/wiki/Regressione_lineare" target="_blank">regressione lineare</a> sui differenti livelli assegnati ai tuoi giovani lungo la loro carriera per stimare la pendenza della linea che determina il loro talento.\r\n
